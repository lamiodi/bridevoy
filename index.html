<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#171717">
    <meta name="description" content="BrideVoy delivers a premium Mercedes-Benz S-Class chauffeur experience for weddings, executive occasions, and VIP transfers in Lagos. The Art of Grand Arrival.">
    <meta name="keywords" content="luxury car rental Lagos, wedding chauffeur Lagos, Mercedes S-Class rental, VIP transport Nigeria, BrideVoy">
    <meta name="author" content="BrideVoy">
    <meta name="robots" content="index,follow">
    <meta name="geo.region" content="NG-LA">
    <meta name="geo.placename" content="Lagos, Nigeria">

    <!-- Open Graph -->
    <meta property="og:title" content="BrideVoy — Mercedes-Benz S-Class Wedding Chauffeur in Lagos">
    <meta property="og:description" content="Premium Mercedes-Benz S-Class chauffeur experience for weddings, proposals, and VIP transfers across Lagos and Ikoyi, Victoria Island, and Lekki.">
    <meta property="og:image" content="/og.svg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="BrideVoy — Mercedes-Benz S-Class wedding chauffeur in Lagos">
    <meta property="og:url" content="https://bridevoy.com">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="BrideVoy">
    <meta property="og:locale" content="en_NG">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="BrideVoy — Mercedes-Benz S-Class Wedding Chauffeur in Lagos">
    <meta name="twitter:description" content="Premium Mercedes-Benz S-Class chauffeur experience for weddings, proposals, and VIP transfers across Lagos.">
    <meta name="twitter:image" content="/og.svg">
    <meta name="twitter:image:alt" content="BrideVoy — Mercedes-Benz S-Class wedding chauffeur in Lagos">
    <meta name="twitter:site" content="@bridevoy">

    <link rel="canonical" href="https://bridevoy.com">
    <link rel="alternate" hreflang="en-ng" href="https://bridevoy.com">
    <link rel="alternate" hreflang="x-default" href="https://bridevoy.com">

    <title>BrideVoy — Mercedes-Benz S-Class Wedding Chauffeur in Lagos</title>

    <!-- Favicon -->
    <link rel="icon" href="/logo.webp" type="image/webp">
    <link rel="apple-touch-icon" href="/logo.webp">

    <!-- Fonts (preconnect + display=swap for faster LCP) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Structured Data: LocalBusiness -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "@id": "https://bridevoy.com/#business",
      "name": "BrideVoy",
      "description": "Premium Mercedes-Benz S-Class chauffeur experience for weddings, proposals, executive occasions, and VIP transfers in Lagos.",
      "image": "https://bridevoy.com/og.svg",
      "url": "https://bridevoy.com",
      "telephone": "__BRAND_PHONE__",
      "priceRange": "₦₦₦",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Lagos",
        "addressRegion": "Lagos",
        "addressCountry": "NG"
      },
      "areaServed": [
        { "@type": "Place", "name": "Ikoyi" },
        { "@type": "Place", "name": "Victoria Island" },
        { "@type": "Place", "name": "Lekki" },
        { "@type": "Place", "name": "Ikeja GRA" }
      ],
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"],
        "opens": "08:00",
        "closes": "20:00"
      },
      "sameAs": [
        "https://instagram.com/bridevoy"
      ]
    }
    </script>

    <!-- Structured Data: FAQPage (rendered from FAQ_ITEMS at build time would be ideal;
         here we mirror the highest-intent questions for SEO) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is included in the rental?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Every rental includes a professional chauffeur, fuel for the agreed journey, and complimentary refreshments."
          }
        },
        {
          "@type": "Question",
          "name": "How far in advance should I book?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We recommend booking at least 2–3 months in advance, especially for peak wedding seasons between October and April."
          }
        },
        {
          "@type": "Question",
          "name": "Are there any hidden charges?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. A fixed ₦300,000 caution fee applies to all bookings and is clearly itemised in your final invoice."
          }
        },
        {
          "@type": "Question",
          "name": "What is your cancellation policy?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Cancellations made 30+ days before the event receive a full caution-fee refund. Within 30 days, a 50% retention applies to cover reservation costs."
          }
        }
      ]
    }
    </script>

    <!-- Google Analytics - Safe Dynamic Loader -->
    <script>
        (function() {
            const GA_ID =
                document.querySelector('meta[name="bridevoy-ga-id"]')?.getAttribute('content')?.trim() || '';
            if (GA_ID) {
                const script = document.createElement('script');
                script.async = true;
                script.src = 'https://www.googletagmanager.com/gtag/js?id=' + GA_ID;
                document.head.appendChild(script);

                window.dataLayer = window.dataLayer || [];
                window.dataLayer.push(['js', new Date()]);
                window.dataLayer.push(['config', GA_ID]);
            }
        })();
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
